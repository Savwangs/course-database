name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Build and push Docker image
        run: |
          gcloud builds submit --tag gcr.io/coursegenieback/coursegenie-api

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy coursegenie-api \
            --image gcr.io/coursegenieback/coursegenie-api \
            --region us-west2 \
            --platform managed \
            --add-cloudsql-instances coursegenieback:us-west2:coursegenie-db \
            --allow-unauthenticated